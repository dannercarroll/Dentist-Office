<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; padding: 0; background: transparent; font-family: var(--font-sans, sans-serif); }
svg text { font-family: var(--font-sans, sans-serif); }
.room-label { font-size: 11px; font-weight: 500; fill: var(--color-text-secondary, #666); }
.dev-label { font-size: 9px; fill: var(--color-text-primary, #222); }
.dev-sub { font-size: 8px; fill: var(--color-text-secondary, #888); }
/* Cable colors */
.cable-clinical { stroke: #378ADD; stroke-width: 1.5; fill: none; stroke-dasharray: 5 3; }
.cable-camera   { stroke: #888780; stroke-width: 1.5; fill: none; stroke-dasharray: 5 3; }
.cable-trunk    { stroke: #533; stroke-width: 2.5; fill: none; }
.wifi-staff     { stroke: #1D9E75; stroke-width: 1.2; fill: none; stroke-dasharray: 2 2; opacity: 0.7; }
.wifi-guest     { stroke: #D85A30; stroke-width: 1.2; fill: none; stroke-dasharray: 2 2; opacity: 0.7; }
</style>
</head>
<body>
<svg width="100%" viewBox="0 0 720 960" role="img">
  <title>BrighterSmile Dental Office — Network Layout</title>
  <desc>Floor plan showing all rooms, network devices, and Cat6a cable runs through walls for a dental office.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ══════════ LEGEND ══════════ -->
  <rect x="10" y="8" width="700" height="30" rx="5" fill="none" stroke="#ccc" stroke-width="0.5"/>
  <rect x="22" y="17" width="10" height="10" rx="2" fill="#378ADD" opacity="0.8"/>
  <text x="36" y="26" class="dev-label">Clinical VLAN (ethernet)</text>
  <rect x="160" y="17" width="10" height="10" rx="2" fill="#888780" opacity="0.8"/>
  <text x="174" y="26" class="dev-label">Camera VLAN</text>
  <line x1="268" y1="22" x2="290" y2="22" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="294" y="26" class="dev-label">Staff Wi-Fi (iPads)</text>
  <line x1="404" y1="22" x2="426" y2="22" stroke="#D85A30" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="430" y="26" class="dev-label">Guest Wi-Fi</text>
  <line x1="510" y1="22" x2="532" y2="22" stroke="#4a2222" stroke-width="2.5"/>
  <text x="536" y="26" class="dev-label">Trunk / backbone</text>

  <!-- ══════════ BUILDING OUTER WALL ══════════ -->
  <!-- Wall = thick rect border -->
  <rect x="18" y="46" width="684" height="904" rx="6" fill="#e8e6df" stroke="#555" stroke-width="14"/>
  <!-- Interior floor -->
  <rect x="25" y="53" width="670" height="890" fill="#fafaf8"/>

  <!-- ══════════ INTERIOR WALLS ══════════ -->
  <!-- Horizontal wall: reception area bottom -->
  <rect x="25" y="280" width="670" height="10" fill="#c8c6be" stroke="#888" stroke-width="0.5"/>
  <!-- Horizontal wall: mid-office split -->
  <rect x="25" y="570" width="670" height="10" fill="#c8c6be" stroke="#888" stroke-width="0.5"/>
  <!-- Vertical: reception left divider (creates front desk pocket) -->
  <rect x="230" y="53" width="10" height="237" fill="#c8c6be" stroke="#888" stroke-width="0.5"/>
  <!-- Gap/door in left divider -->
  <rect x="230" y="210" width="10" height="40" fill="#fafaf8"/>
  <!-- Vertical: waiting area right divider -->
  <rect x="480" y="53" width="10" height="237" fill="#c8c6be" stroke="#888" stroke-width="0.5"/>
  <!-- Vertical: exam room divider (top half clinical) -->
  <rect x="360" y="290" width="10" height="290" fill="#c8c6be" stroke="#888" stroke-width="0.5"/>
  <!-- Vertical: x-ray room divider -->
  <rect x="540" y="290" width="10" height="290" fill="#c8c6be" stroke="#888" stroke-width="0.5"/>
  <!-- Vertical: bottom left / closet divider -->
  <rect x="230" y="580" width="10" height="364" fill="#c8c6be" stroke="#888" stroke-width="0.5"/>
  <!-- Vertical: bottom right / break room divider -->
  <rect x="510" y="580" width="10" height="364" fill="#c8c6be" stroke="#888" stroke-width="0.5"/>
  <!-- Door gaps in bottom section -->
  <rect x="230" y="650" width="10" height="40" fill="#fafaf8"/>
  <rect x="510" y="650" width="10" height="40" fill="#fafaf8"/>
  <!-- Door gaps clinical rooms -->
  <rect x="360" y="360" width="10" height="36" fill="#fafaf8"/>
  <rect x="540" y="360" width="10" height="36" fill="#fafaf8"/>

  <!-- ══════════ ROOM FILL TINTS ══════════ -->
  <!-- Reception / front desk -->
  <rect x="25" y="53" width="205" height="227" fill="#EBF5FF" opacity="0.5"/>
  <!-- Waiting room -->
  <rect x="240" y="53" width="240" height="227" fill="#FFF8F0" opacity="0.5"/>
  <!-- Pharmacy / storage -->
  <rect x="490" y="53" width="205" height="227" fill="#F5F5F0" opacity="0.5"/>
  <!-- Exam room 1 -->
  <rect x="25" y="290" width="335" height="280" fill="#EBF5FF" opacity="0.5"/>
  <!-- Exam room 2 -->
  <rect x="370" y="290" width="170" height="280" fill="#EBF5FF" opacity="0.5"/>
  <!-- X-ray lab -->
  <rect x="550" y="290" width="145" height="280" fill="#EBF5FF" opacity="0.5"/>
  <!-- Network closet -->
  <rect x="25" y="580" width="205" height="364" fill="#F0F8F0" opacity="0.6"/>
  <!-- Private office -->
  <rect x="240" y="580" width="270" height="364" fill="#EBF5FF" opacity="0.5"/>
  <!-- Break room -->
  <rect x="520" y="580" width="175" height="364" fill="#FFF8F0" opacity="0.5"/>

  <!-- ══════════ ROOM NAME LABELS ══════════ -->
  <text x="127" y="76" class="room-label" text-anchor="middle">RECEPTION</text>
  <text x="360" y="76" class="room-label" text-anchor="middle">WAITING ROOM</text>
  <text x="593" y="76" class="room-label" text-anchor="middle">PHARMACY / STORAGE</text>
  <text x="112" y="312" class="room-label" text-anchor="middle">EXAM ROOM 1</text>
  <text x="455" y="312" class="room-label" text-anchor="middle">EXAM ROOM 2</text>
  <text x="623" y="312" class="room-label" text-anchor="middle">X-RAY LAB</text>
  <text x="127" y="602" class="room-label" text-anchor="middle">NETWORK CLOSET</text>
  <text x="375" y="602" class="room-label" text-anchor="middle">PRIVATE OFFICE</text>
  <text x="607" y="602" class="room-label" text-anchor="middle">BREAK ROOM</text>

  <!-- ══════════════════════════════════════════════
       NETWORK CLOSET EQUIPMENT (bottom-left)
       UDM-Pro → Switch → Patch Panel
       This is the hub; all cables route here through walls
  ══════════════════════════════════════════════ -->
  <!-- Rack outline -->
  <rect x="40" y="620" width="170" height="130" rx="4" fill="#e0f0e0" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="125" y="638" class="dev-label" text-anchor="middle" font-weight="500">Network Rack</text>
  <!-- UDM-Pro -->
  <rect x="52" y="645" width="70" height="28" rx="3" fill="#0C447C" stroke="#042C53" stroke-width="0.5"/>
  <text x="87" y="663" class="dev-label" text-anchor="middle" fill="#E6F1FB">UDM-Pro</text>
  <!-- Switch -->
  <rect x="132" y="645" width="70" height="28" rx="3" fill="#0C447C" stroke="#042C53" stroke-width="0.5"/>
  <text x="167" y="663" class="dev-label" text-anchor="middle" fill="#E6F1FB">USW-16 PoE</text>
  <!-- Patch Panel -->
  <rect x="52" y="683" width="150" height="22" rx="3" fill="#444" stroke="#222" stroke-width="0.5"/>
  <text x="127" y="698" class="dev-label" text-anchor="middle" fill="#eee">Patch Panel (18-port)</text>
  <!-- GL.iNet backup -->
  <rect x="52" y="715" width="90" height="24" rx="3" fill="#3B6D11" stroke="#173404" stroke-width="0.5"/>
  <text x="97" y="731" class="dev-label" text-anchor="middle" fill="#EAF3DE">GL.iNet (LTE backup)</text>
  <!-- Fiber ONT -->
  <rect x="150" y="715" width="52" height="24" rx="3" fill="#5F5E5A" stroke="#2C2C2A" stroke-width="0.5"/>
  <text x="176" y="731" class="dev-label" text-anchor="middle" fill="#F1EFE8">Fiber ONT</text>

  <!-- Trunk: ONT → UDM-Pro -->
  <line x1="176" y1="715" x2="87" y2="673" class="cable-trunk"/>
  <!-- Trunk: UDM-Pro → Switch -->
  <line x1="122" y1="659" x2="132" y2="659" class="cable-trunk"/>
  <!-- Trunk: Switch → Patch Panel -->
  <line x1="167" y1="673" x2="127" y2="683" class="cable-trunk"/>
  <!-- backup → UDM-Pro -->
  <line x1="97" y1="715" x2="87" y2="673" stroke="#3B6D11" stroke-width="1.2" fill="none" stroke-dasharray="4 3"/>

  <!-- ══════════════════════════════════════════════
       CABLE RUNS — all go through walls (routed with L-bends)
       Color: clinical=blue dashed, camera=gray dashed
  ══════════════════════════════════════════════ -->

  <!-- SPINE: Patch panel up through left wall to each room -->
  <!-- Patch → up left wall → Reception -->
  <path d="M 80 683 L 80 760 L 30 760 L 30 580 L 30 170 L 80 170" class="cable-clinical" marker-end="url(#arr)"/>
  <!-- Patch → up left wall → Exam Room 1 (via wall) -->
  <path d="M 100 683 L 100 755 L 32 755 L 32 430" class="cable-clinical" marker-end="url(#arr)"/>
  <!-- Patch → right through bottom wall → Private Office -->
  <path d="M 127 705 L 127 760 L 375 760 L 375 700" class="cable-clinical" marker-end="url(#arr)"/>
  <!-- Patch → right through wall → Exam Room 2 -->
  <path d="M 127 700 L 127 758 L 456 758 L 456 580 L 456 490" class="cable-clinical" marker-end="url(#arr)"/>
  <!-- Patch → far right → X-ray lab -->
  <path d="M 140 700 L 140 756 L 625 756 L 625 580 L 625 490" class="cable-clinical" marker-end="url(#arr)"/>
  <!-- Patch → up through left wall → Waiting room AP -->
  <path d="M 90 683 L 90 752 L 34 752 L 34 165 L 360 165 L 360 160" class="cable-clinical" marker-end="url(#arr)"/>
  <!-- Patch → Hallway/Break room AP -->
  <path d="M 110 700 L 110 754 L 33 754 L 33 750 L 33 580 L 33 400 L 607 400 L 607 420" class="cable-clinical" marker-end="url(#arr)"/>
  <!-- Camera cables (gray) -->
  <!-- Reception camera -->
  <path d="M 75 683 L 75 762 L 28 762 L 28 100 L 100 100" class="cable-camera" marker-end="url(#arr)"/>
  <!-- Hallway camera -->
  <path d="M 78 683 L 78 764 L 29 764 L 29 330 L 365 330 L 365 320" class="cable-camera" marker-end="url(#arr)"/>
  <!-- Pharmacy camera -->
  <path d="M 82 683 L 82 766 L 31 766 L 31 100 L 590 100 L 590 95" class="cable-camera" marker-end="url(#arr)"/>

  <!-- Phone cables -->
  <!-- Reception phone -->
  <path d="M 95 683 L 95 757 L 36 757 L 36 200 L 140 200" stroke="#BA7517" stroke-width="1.2" fill="none" stroke-dasharray="3 3" marker-end="url(#arr)"/>
  <!-- Exam room phone -->
  <path d="M 105 683 L 105 753 L 37 753 L 37 460 L 150 460" stroke="#BA7517" stroke-width="1.2" fill="none" stroke-dasharray="3 3" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════
       RECEPTION ROOM DEVICES
  ══════════════════════════════════════════════ -->
  <!-- Desktop 1 -->
  <rect x="50" y="155" width="76" height="44" rx="4" fill="#B5D4F4" stroke="#378ADD" stroke-width="1"/>
  <text x="88" y="174" class="dev-label" text-anchor="middle" font-weight="500">Desktop 1</text>
  <text x="88" y="186" class="dev-sub" text-anchor="middle">ThinkCentre neo</text>
  <!-- Desktop 2 -->
  <rect x="140" y="155" width="76" height="44" rx="4" fill="#B5D4F4" stroke="#378ADD" stroke-width="1"/>
  <text x="178" y="174" class="dev-label" text-anchor="middle" font-weight="500">Desktop 2</text>
  <text x="178" y="186" class="dev-sub" text-anchor="middle">ThinkCentre neo</text>
  <!-- Reception Printer -->
  <rect x="50" y="220" width="70" height="36" rx="4" fill="#B5D4F4" stroke="#378ADD" stroke-width="1"/>
  <text x="85" y="236" class="dev-label" text-anchor="middle" font-weight="500">Printer</text>
  <text x="85" y="248" class="dev-sub" text-anchor="middle">Canon MF663</text>
  <!-- Reception Phone -->
  <rect x="140" y="220" width="60" height="36" rx="4" fill="#FAC775" stroke="#BA7517" stroke-width="1"/>
  <text x="170" y="236" class="dev-label" text-anchor="middle" font-weight="500">VoIP Phone</text>
  <text x="170" y="248" class="dev-sub" text-anchor="middle">Grandstream</text>
  <!-- Reception Camera -->
  <rect x="60" y="90" width="70" height="30" rx="4" fill="#D3D1C7" stroke="#888780" stroke-width="1"/>
  <text x="95" y="109" class="dev-label" text-anchor="middle" font-weight="500">📷 Camera</text>

  <!-- ══════════════════════════════════════════════
       WAITING ROOM
  ══════════════════════════════════════════════ -->
  <!-- Wi-Fi AP (waiting room) -->
  <circle cx="360" cy="155" r="20" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="360" y="152" class="dev-label" text-anchor="middle" font-weight="500">AP</text>
  <text x="360" y="164" class="dev-sub" text-anchor="middle">Wi-Fi 6</text>
  <!-- Guest wifi rings -->
  <ellipse cx="360" cy="155" rx="50" ry="30" fill="none" stroke="#D85A30" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.6"/>
  <ellipse cx="360" cy="155" rx="80" ry="50" fill="none" stroke="#D85A30" stroke-width="0.6" stroke-dasharray="3 3" opacity="0.4"/>
  <!-- Staff iPad in waiting -->
  <rect x="290" y="180" width="52" height="36" rx="4" fill="#9FE1CB" stroke="#1D9E75" stroke-width="1"/>
  <text x="316" y="196" class="dev-label" text-anchor="middle" font-weight="500">iPad</text>
  <text x="316" y="208" class="dev-sub" text-anchor="middle">Staff VLAN</text>
  <!-- Staff wifi line to AP -->
  <line x1="342" y1="162" x2="316" y2="180" class="wifi-staff"/>

  <!-- ══════════════════════════════════════════════
       PHARMACY / STORAGE (top right)
  ══════════════════════════════════════════════ -->
  <rect x="560" y="80" width="70" height="30" rx="4" fill="#D3D1C7" stroke="#888780" stroke-width="1"/>
  <text x="595" y="99" class="dev-label" text-anchor="middle" font-weight="500">📷 Camera</text>

  <!-- ══════════════════════════════════════════════
       HALLWAY / CORRIDOR — AP in the middle-ish area
  ══════════════════════════════════════════════ -->
  <!-- Hallway camera -->
  <rect x="335" y="316" width="70" height="26" rx="4" fill="#D3D1C7" stroke="#888780" stroke-width="1"/>
  <text x="370" y="333" class="dev-label" text-anchor="middle" font-weight="500">📷 Camera</text>

  <!-- ══════════════════════════════════════════════
       EXAM ROOM 1 (large left clinical)
  ══════════════════════════════════════════════ -->
  <rect x="40" y="380" width="80" height="44" rx="4" fill="#B5D4F4" stroke="#378ADD" stroke-width="1"/>
  <text x="80" y="398" class="dev-label" text-anchor="middle" font-weight="500">Desktop</text>
  <text x="80" y="410" class="dev-sub" text-anchor="middle">ThinkCentre neo</text>
  <!-- Exam phone -->
  <rect x="140" y="430" width="60" height="36" rx="4" fill="#FAC775" stroke="#BA7517" stroke-width="1"/>
  <text x="170" y="446" class="dev-label" text-anchor="middle" font-weight="500">VoIP Phone</text>
  <text x="170" y="458" class="dev-sub" text-anchor="middle">Grandstream</text>
  <!-- iPad -->
  <rect x="40" y="450" width="52" height="36" rx="4" fill="#9FE1CB" stroke="#1D9E75" stroke-width="1"/>
  <text x="66" y="466" class="dev-label" text-anchor="middle" font-weight="500">iPad</text>
  <text x="66" y="478" class="dev-sub" text-anchor="middle">Staff VLAN</text>
  <!-- Wall jack dot -->
  <circle cx="35" cy="430" r="5" fill="#378ADD" stroke="#042C53" stroke-width="1"/>
  <text x="46" y="418" class="dev-sub">wall jack</text>

  <!-- ══════════════════════════════════════════════
       EXAM ROOM 2 (middle-right clinical)
  ══════════════════════════════════════════════ -->
  <rect x="385" y="370" width="80" height="44" rx="4" fill="#B5D4F4" stroke="#378ADD" stroke-width="1"/>
  <text x="425" y="388" class="dev-label" text-anchor="middle" font-weight="500">Desktop</text>
  <text x="425" y="400" class="dev-sub" text-anchor="middle">ThinkCentre neo</text>
  <!-- iPad exam 2 -->
  <rect x="385" y="430" width="52" height="36" rx="4" fill="#9FE1CB" stroke="#1D9E75" stroke-width="1"/>
  <text x="411" y="446" class="dev-label" text-anchor="middle" font-weight="500">iPad</text>
  <text x="411" y="458" class="dev-sub" text-anchor="middle">Staff VLAN</text>
  <!-- Wall jack -->
  <circle cx="375" cy="415" r="5" fill="#378ADD" stroke="#042C53" stroke-width="1"/>
  <!-- Ethernet from jack to desktop -->
  <line x1="375" y1="415" x2="385" y2="392" class="cable-clinical"/>

  <!-- ══════════════════════════════════════════════
       X-RAY LAB
  ══════════════════════════════════════════════ -->
  <rect x="558" y="350" width="88" height="44" rx="4" fill="#B5D4F4" stroke="#378ADD" stroke-width="1"/>
  <text x="602" y="368" class="dev-label" text-anchor="middle" font-weight="500">X-Ray PC</text>
  <text x="602" y="380" class="dev-sub" text-anchor="middle">IdeaCentre i7</text>
  <!-- X-ray machine -->
  <rect x="558" y="410" width="88" height="44" rx="4" fill="#E6F1FB" stroke="#378ADD" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="602" y="428" class="dev-label" text-anchor="middle" font-weight="500">X-Ray Machine</text>
  <text x="602" y="440" class="dev-sub" text-anchor="middle">CS 8100 3D</text>
  <!-- Short ethernet X-ray to PC -->
  <line x1="602" y1="410" x2="602" y2="394" class="cable-clinical"/>
  <!-- Wall jack -->
  <circle cx="555" cy="370" r="5" fill="#378ADD" stroke="#042C53" stroke-width="1"/>
  <line x1="555" y1="370" x2="558" y2="370" class="cable-clinical"/>

  <!-- ══════════════════════════════════════════════
       BREAK ROOM AP (right side)
  ══════════════════════════════════════════════ -->
  <circle cx="607" cy="430" r="20" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="607" y="427" class="dev-label" text-anchor="middle" font-weight="500">AP</text>
  <text x="607" y="439" class="dev-sub" text-anchor="middle">Wi-Fi 6</text>
  <!-- Guest rings break room -->
  <ellipse cx="607" cy="430" rx="45" ry="28" fill="none" stroke="#D85A30" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.6"/>
  <ellipse cx="607" cy="430" rx="70" ry="45" fill="none" stroke="#D85A30" stroke-width="0.6" stroke-dasharray="3 3" opacity="0.4"/>

  <!-- ══════════════════════════════════════════════
       PRIVATE OFFICE (bottom middle)
  ══════════════════════════════════════════════ -->
  <!-- High-end Desktop -->
  <rect x="260" y="650" width="88" height="44" rx="4" fill="#B5D4F4" stroke="#378ADD" stroke-width="1"/>
  <text x="304" y="668" class="dev-label" text-anchor="middle" font-weight="500">Desktop</text>
  <text x="304" y="680" class="dev-sub" text-anchor="middle">IdeaCentre i7</text>
  <!-- Laptop -->
  <rect x="370" y="650" width="80" height="44" rx="4" fill="#B5D4F4" stroke="#378ADD" stroke-width="1"/>
  <text x="410" y="668" class="dev-label" text-anchor="middle" font-weight="500">Laptop</text>
  <text x="410" y="680" class="dev-sub" text-anchor="middle">Lenovo V15</text>
  <!-- Printer -->
  <rect x="260" y="710" width="80" height="36" rx="4" fill="#B5D4F4" stroke="#378ADD" stroke-width="1"/>
  <text x="300" y="727" class="dev-label" text-anchor="middle" font-weight="500">Printer</text>
  <text x="300" y="739" class="dev-sub" text-anchor="middle">Canon MF663</text>
  <!-- iPad private office -->
  <rect x="360" y="710" width="52" height="36" rx="4" fill="#9FE1CB" stroke="#1D9E75" stroke-width="1"/>
  <text x="386" y="726" class="dev-label" text-anchor="middle" font-weight="500">iPad</text>
  <text x="386" y="738" class="dev-sub" text-anchor="middle">Staff VLAN</text>
  <!-- Wall jack private office -->
  <circle cx="245" cy="670" r="5" fill="#378ADD" stroke="#042C53" stroke-width="1"/>
  <line x1="245" y1="670" x2="260" y2="672" class="cable-clinical"/>

  <!-- ══════════════════════════════════════════════
       BREAK ROOM (bottom right)
  ══════════════════════════════════════════════ -->
  <circle cx="607" cy="700" r="20" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="607" y="697" class="dev-label" text-anchor="middle" font-weight="500">AP</text>
  <text x="607" y="709" class="dev-sub" text-anchor="middle">Wi-Fi 6 (break)</text>
  <!-- Guest rings -->
  <ellipse cx="607" cy="700" rx="50" ry="32" fill="none" stroke="#D85A30" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.6"/>

  <!-- ══════════════════════════════════════════════
       WALL JACKS (dots showing outlet locations per room)
  ══════════════════════════════════════════════ -->
  <!-- Reception jacks -->
  <circle cx="35" cy="165" r="5" fill="#378ADD" stroke="#042C53" stroke-width="1"/>
  <line x1="35" y1="165" x2="50" y2="170" class="cable-clinical"/>
  <circle cx="35" cy="225" r="5" fill="#378ADD" stroke="#042C53" stroke-width="1"/>
  <line x1="35" y1="225" x2="50" y2="232" class="cable-clinical"/>
  <!-- X-ray wall jack line to machine -->
  <line x1="555" y1="418" x2="558" y2="432" class="cable-clinical"/>

  <!-- ══════════════════════════════════════════════
       FIBER ENTRY LABEL
  ══════════════════════════════════════════════ -->
